custom_groups:
  - developers
  - webadmins

users:
  - name: developer
    shell: /bin/zsh
    state: present
    password: "{{ 'developer' | password_hash('sha512') }}"
    ssh_key: "ssh-rsa  developer@local"
    groups:
      - sudo
      - developers
  - name: webadmin
    shell: /bin/bash
    state: present
    password: "{{ 'webadmin' | password_hash('sha512') }}"
    ssh_key: ""
    groups:
      - www-data
      - webadmins

packages_to_install:
  - htop
  - ncdu
  - git
  - nano
  - curl
  - unzip

static_root: /usr/share/nginx/html/images